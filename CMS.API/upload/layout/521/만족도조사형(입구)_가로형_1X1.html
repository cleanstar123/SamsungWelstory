<!doctype html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1920, user-scalable=yes"/>
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<title>만족도조사형(입구)_가로형_1X1</title>

<style type="text/css">
	@font-face {font-family:'NanumBarunGothic';font-style:normal;src:url('https://weldid.welstory.com:8443/fonts/NanumBarunGothic.eot');src:local(※), url('https://weldid.welstory.com:8443/fonts/NanumBarunGothic.woff') format('woff'),url('https://weldid.welstory.com:8443/fonts/NanumBarunGothic.ttf') format('truetype');}
	* {margin:0;padding:0;list-style:none;-webkit-box-sizing:border-box;-moz-box-sizing:border-box;-o-box-sizing:border-box;box-sizing:border-box;}
	html,body {position:relative;width:100%;height:100%;}
	a {text-decoration:none;color:inherit;}
	#layer {position:relative;width:100%;height:100%;min-width:1920px;min-height:1080px;padding:2.75%;font-family:'NanumBarunGothic', '돋움', '굴림', sans-serif;background-image:url('images/bg_ho.jpg');line-height:normal;}
	.layer_wrap {position:relative;width:100%;}
	.layer_wrap h1 {padding:0 0 0.52em 0;text-align:center;font-size:80px;color:#414042;letter-spacing:2px;font-family:'NanumBarunGothic', '돋움', '굴림', sans-serif;font-weight:bold;}
	.layer_wrap:after {display:block;content:"";clear:both;}
	.layer_wrap .menuList {position:relative;width:58%;margin:0 auto;padding-bottom:1.5em;box-shadow:4px 4px 10px 2px #bebcb6;background-color:#fff;text-align: center;}
	.layer_wrap .menuList:before {display:block;content:"";position:absolute;bottom:0;left:0;right:0;height:17em;background-color:#eae9e7;}
	.menuList > div {position:relative;width:89%;display:flex;align-items:center;justify-content:center;background-color:#e6e6e6;border:1px solid #bebebe;color:#555;font-weight:900;}
	.menuList .area_name {position:absolute;top:5px;right:5px;font-size:12px;color:#444;word-wrap:break-word;}
	.menuList .area_explain {width:100%;color:#444;text-align:center;word-wrap:break-word;}
	.menuList span.tit_val {display:none}
	.sticker {position:absolute !important;top:-21px;left:0;width:170px !important;height:223px !important;z-index:10;font-size:14px;background-color:#a4a4a4 !important;border:1px solid #767676 !important;color:#444;}
	.sticker img {width:100%;height: 100%;position: absolute;top: 0;left: 0;}
	.menu_logo {width:100% !important;height:auto !important;padding:1% 0;background-color:#e9e7e6;font-size:14px;border:0 !important;}
	.menu_logo .area_explain {width: 440px;height:95px;background-color:#e6e6e6;border:1px solid #bebebe;display:flex;align-items:center;justify-content:center;}
	.menu_logo img {max-width:440px;max-height:95px;}
	.menuImage {width:auto !important;height:283px;margin:5.65em 37% 0 6.5%;font-size:14px;position: relative;}
	.menuImage img {width:470px;height:283px;}
	.menuName {height:52px;margin:2.25em auto 0 auto;font-size:41px;}
	.menuNameEng {height:34px;margin:0.3em auto 0 auto;font-size:25px;color:#5d5c5e;}
	.menuPrice {height:41px;margin:0.4em auto 0 auto;font-size:34px;}
	.menuAdd,.menuKcal {margin:0 auto;font-size:23px;color:#7b7c7f;line-height:20px;}
	.menuAdd {height:28px;margin-top:0.9em;letter-spacing: -0.2px;}
	.menuKcal {height:28px;margin-top:0.3em;}
	.menuAdd .area_explain,.menuKcal .area_explain {text-align:left;font-weight:normal;}
	.satisfaction {position:absolute !important;display:block !important;top:161px;right:0;width:30% !important;height:auto !important;background-color:transparent !important;text-align:center;border:0 !important;}
	.satisfaction > p {position:relative;width:63px;height:63px;margin-bottom:10px;background-repeat:no-repeat;background-position:center center;background-size:contain;}
	.satisfaction > p.satisfactionType1 {background-image:url("images/emoticon_b_1.png");color:#436ab3}
	.satisfaction > p.satisfactionType2 {background-image:url("images/emoticon_b_2.png");color:#6c8cc7}
	.satisfaction > p.satisfactionType3 {background-image:url("images/emoticon_b_3.png");color:#ec9123}
	.satisfaction > p.satisfactionType4 {background-image:url("images/emoticon_b_4.png");color:#e0917a}
	.satisfaction > p.satisfactionType5 {background-image:url("images/emoticon_b_5.png");color:#e65a41}
	.satisfaction .score {display:block;position:absolute;left:100%;width:100%;height:25px;margin-left:35px;font-size:40px;font-weight:bold;text-align:left;line-height:63px;}
	.menuList .active,.menuList .active .area_explain {background-color:transparent !important;border-color:transparent !important;}
	.menuList .active .area_name,.menuList .active span.tit_blk {display:none;}
	.menuList .active span.tit_val {display:block;}
	.menuList .menuImage.active .area_explain .tit_val {text-align:center;}
	.menuList .menuAdd.active .area_explain,.menuList .menuKcal.active .area_explain {text-align:center;color:#7f8083;}
	.menuList .select,.menuList .menu_logo.select .area_explain{border:1px solid #f7960c !important;background-color:#ffc36e !important;}
	.menuList .menu_logo.select {border:0 !important;}
	/* system 레이어 */
	.frame_r .content .sub_cnt_tem {width:100%;background-image:url('images/bg_ho.jpg');}
	.frame_r .content .sub_cnt_tem #layer {min-width:1577px;min-height:761px;padding: 2.75% 9%;background-image:none;}
	.frame_r .content .sub_cnt_tem .layer_wrap h1 {padding:0 0 0.5em 0;font-size:55px;}
	.frame_r .content .sub_cnt_tem .layer_wrap .menuList:before {height: 16em;}
	.frame_r .content .sub_cnt_tem .sticker {top:-16px;width:120px !important;height:160px !important;}
	.frame_r .content .sub_cnt_tem .menu_logo .area_explain {width:300px;height:70px;}
	.frame_r .content .sub_cnt_tem .menu_logo img {width:300px;height:70px;}
	.frame_r .content .sub_cnt_tem .menuImage {height:202px;margin: 2.5em 37% 0 6.5%;}
	.frame_r .content .sub_cnt_tem .menuImage img {width:330px;height:202px;}
	.frame_r .content .sub_cnt_tem .menuName {height:34px;margin:3.1em auto 0 auto;font-size:28px;}
	.frame_r .content .sub_cnt_tem .menuNameEng {height: 25px;margin: 0.25em auto 0 auto;font-size:18px;}
	.frame_r .content .sub_cnt_tem .menuPrice {height:32px;margin:0.4em auto 0 auto;font-size:26px;}
	.frame_r .content .sub_cnt_tem .menuAdd,.frame_r .content .sub_cnt_tem .menuKcal {font-size:16px;line-height:13px;letter-spacing: -0.5px;}
	.frame_r .content .sub_cnt_tem .menuAdd {height:15px;margin-top:0.7em;}
	.frame_r .content .sub_cnt_tem .menuKcal {height:15px;}
	.frame_r .content .sub_cnt_tem .satisfaction {top:95px;}
	.frame_r .content .sub_cnt_tem .satisfaction > p {height:42px;}
	.frame_r .content .sub_cnt_tem .satisfaction .score {font-size:26px;margin-left:5px;line-height:42px;}
</style>
</head>
<body>
<input type="hidden" id="LAYOUT_HV_TYPE" value="H">
<input type="hidden" id="LAYOUT_H_BY_V" value="1x1">
<input type="hidden" id="SCREEN_X" value="1920">
<input type="hidden" id="SCREEN_Y" value="1080">
<div id="layer">
	<div class="layer_wrap">
		<h1>오늘의 메뉴</h1>

		<!-- 첫번째 메뉴 -->
		<div class="menuList">
			<div class="sticker"><p class="area_name">CA1</p><p class="area_explain"><span class="tit_blk">컨텐츠 영역<br>(배지)</span><span class="tit_val" data-contents-area-id="CA1" data-contents-area-type="badge"></span></p></div>
			<div class="menu_logo"><p class="area_name">CA6</p><p class="area_explain"><span class="tit_blk">컨텐츠 영역<br>(헤드라인)</span><span class="tit_val" data-contents-area-id="CA6" data-contents-area-type="head"></span></p></div>
			<div class="menuImage"><p class="area_name">CA2</p><p class="area_explain"><span class="tit_blk">컨텐츠 영역<br>(메뉴 이미지)</span><span class="tit_val" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="image"></span></p></div>
			<div class="menuName"><p class="area_name">CA2</p><p class="area_explain"><span class="tit_blk">음식명</span><span class="tit_val" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="name" data-contetns-area-length="25"></span></p></div>
			<div class="menuNameEng"><p class="area_name">CA2</p><p class="area_explain"><span class="tit_blk">ENG Title</span><span class="tit_val" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="ename" data-contetns-area-length="40"></span></p></div>
			<div class="menuPrice"><p class="area_name">CA2</p><p class="area_explain"><span class="tit_blk">가격</span><span class="tit_val" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="price" data-contetns-area-length="8"></span></p></div>
			<div class="menuAdd"><p class="area_name">CA2</p><p class="area_explain"><span class="tit_blk">부찬</span><span class="tit_val" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="sidedish" data-contetns-area-length="45"></span></p></div>
			<div class="menuKcal"><p class="area_name">CA2</p><p class="area_explain"><span class="tit_blk">칼로리 Kcal</span><span class="tit_val" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="kcal" data-contetns-area-length="8"></span></p></div>
			<div class="satisfaction">
				<p class="satisfactionType1"><span class="score" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="score1">0</span></p>
				<p class="satisfactionType2"><span class="score" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="score2">0</span></p>
				<p class="satisfactionType3"><span class="score" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="score3">0</span></p>
				<p class="satisfactionType4"><span class="score" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="score4">0</span></p>
				<p class="satisfactionType5"><span class="score" data-contents-area-id="CA2" data-contents-area-type="product" data-product-category="score5">0</span></p>
			</div>
		</div>

	</div>
</div>
</body>
</html>
